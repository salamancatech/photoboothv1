<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Banana Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* The Animated Rainbow Background */
        body {
            background-color: #0f172a;
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #magic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.4;
            background: linear-gradient(45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Starry Overlay */
        #stars-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 50px 160px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            opacity: 0.3;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar for Previews */
        .preview-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .preview-scroll::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }
        .preview-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-white p-4 md:p-8">

    <!-- Background Layers -->
    <div id="magic-bg"></div>
    <div id="stars-overlay"></div>

    <div class="relative z-10 max-w-5xl mx-auto space-y-6">
        <header class="text-center py-6">
            <h1 class="text-5xl font-extrabold tracking-tighter text-yellow-400 drop-shadow-lg">
                🍌 Nano Banana <span class="text-white">Studio</span>
            </h1>
            <p id="statusMsg" class="text-emerald-400 mt-2 font-medium tracking-wide uppercase text-sm">System Online. Dual-Model Routing Active.</p>
        </header>

        <div class="space-y-6" id="mainControls">
            <!-- Prompts Area (Split 2/3 Positive, 1/3 Negative) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Main Prompt Area -->
                <div class="glass-panel p-6 rounded-2xl shadow-lg border border-yellow-500/30 md:col-span-2 flex flex-col">
                    <h2 class="text-xl font-bold mb-4 text-yellow-400 flex items-center gap-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        Scene Description
                    </h2>
                    <textarea id="userPrompt" rows="3" class="w-full bg-gray-900/80 border border-gray-600 rounded-xl p-4 text-lg outline-none focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500/50 transition-all resize-none shadow-inner flex-1" placeholder="Describe the scene you want to generate. e.g., 'A brave knight standing before a futuristic city.'"></textarea>
                </div>
                
                <!-- Negative Prompt Area -->
                <div class="glass-panel p-6 rounded-2xl shadow-lg border border-red-500/30 md:col-span-1 flex flex-col">
                    <h2 class="text-lg font-bold mb-4 text-red-400 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
                        Negative Prompt
                    </h2>
                    <textarea id="negPrompt" rows="3" class="w-full bg-gray-900/80 border border-gray-600 rounded-xl p-4 text-sm outline-none focus:border-red-500 focus:ring-2 focus:ring-red-500/50 transition-all resize-none shadow-inner flex-1" placeholder="Elements to avoid (e.g., blurry, out of focus, distorted, text)"></textarea>
                </div>
            </div>

            <!-- Settings & Context Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <!-- Environment Column -->
                <section class="glass-panel p-5 rounded-2xl flex flex-col">
                    <h2 class="text-lg font-bold mb-4 flex items-center justify-between border-b border-gray-700/50 pb-2">
                        <span>🖼️ Environment Context</span>
                    </h2>
                    <div class="space-y-4 flex-1">
                        <div>
                            <label class="text-xs uppercase text-gray-400 block mb-2 font-semibold tracking-wider">Visual Screenshot</label>
                            <input type="file" id="envImage" accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-yellow-50 file:text-yellow-700 hover:file:bg-yellow-100 transition-colors cursor-pointer">
                            <div id="envPreview" class="mt-3 hidden"></div>
                        </div>
                        <div>
                            <label class="text-xs uppercase text-gray-400 block mb-2 font-semibold tracking-wider">Metadata (.json)</label>
                            <input type="file" id="envJson" accept=".json" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-colors cursor-pointer">
                            <div id="jsonPreview" class="mt-3 text-xs text-gray-400 bg-gray-900/50 p-3 rounded-lg hidden overflow-hidden whitespace-nowrap text-ellipsis border border-gray-700/50"></div>
                        </div>
                    </div>
                </section>

                <!-- Characters Column -->
                <section class="glass-panel p-5 rounded-2xl flex flex-col">
                    <h2 class="text-lg font-bold mb-4 flex items-center justify-between border-b border-gray-700/50 pb-2">
                        <span>👤 Characters (Optional)</span>
                        <button id="addCharBtn" class="text-xs bg-purple-600 hover:bg-purple-500 text-white py-1.5 px-3 rounded-full transition-colors font-bold shadow-[0_0_10px_rgba(147,51,234,0.3)]">+ Add</button>
                    </h2>
                    <p class="text-[11px] text-gray-400 mb-4 leading-relaxed">Upload reference images and assign them names. Add them individually or in batches.</p>
                    <input type="file" id="charImages" accept="image/*" multiple class="hidden">
                    <div id="charPreviews" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-3 hidden overflow-y-auto preview-scroll max-h-[300px] pr-1"></div>
                </section>

                <!-- Style & Mood Column -->
                <section class="glass-panel p-5 rounded-2xl flex flex-col">
                    <h2 class="text-lg font-bold mb-4 border-b border-gray-700/50 pb-2">🎨 Style & Mood</h2>
                    <div class="space-y-4 flex-1">
                        <div>
                            <label class="text-xs uppercase text-gray-400 block mb-2 font-semibold tracking-wider">Art Style</label>
                            <select id="stylePreset" class="w-full bg-gray-900/80 border border-gray-600 rounded-xl p-3 text-sm outline-none focus:border-yellow-500 transition-colors cursor-pointer">
                                <option value="">None (Use Custom)</option>
                                <option value="high-quality cinematic photography, 8k resolution, photorealistic">Cinematic Photo / Photorealism</option>
                                <option value="detailed 2D anime illustration, Studio Ghibli style, vibrant colors">Anime Style</option>
                                <option value="isometric 3D render, claymation style, octane render, soft lighting">3D Isometric</option>
                                <option value="cyberpunk digital art, neon lights, highly detailed, sci-fi">Cyberpunk Concept</option>
                                <option value="hand drawn illustration, ink and pen, detailed line art">Hand Drawn</option>
                                <option value="watercolor painting, soft fluid brush strokes, pastel colors">Watercolor</option>
                                <option value="abstract art, geometric shapes, surreal composition">Abstract</option>
                                <option value="neon art style, glowing vibrant colors, synthwave aesthetic">Neon Aesthetic</option>
                                <option value="cel shaded 3D, comic book style, sharp outlines, flat colors">Cel Shading</option>
                                <option value="messy sketch, rough pencil lines, unfinished artistic draft, raw">Messy Sketch</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs uppercase text-gray-400 block mb-2 font-semibold tracking-wider">Lighting Setup</label>
                            <select id="lightingPreset" class="w-full bg-gray-900/80 border border-gray-600 rounded-xl p-3 text-sm outline-none focus:border-yellow-500 transition-colors cursor-pointer">
                                <option value="">None (Use Custom)</option>
                                <option value="natural sunlight, sharp shadows, golden hour">Golden Hour</option>
                                <option value="soft morning light, diffused sunrise, pastel sky">Early Morning</option>
                                <option value="bright midday sun, clear blue sky, crisp lighting">Bright Midday</option>
                                <option value="twilight hour, moody blue hour lighting, soft shadows">Twilight / Blue Hour</option>
                                <option value="dark night lighting, moonlit scene, cool blue tones">Moonlit Night</option>
                                <option value="cyberpunk neon lighting, deep shadows, glowing accents">Neon Noir</option>
                                <option value="volumetric fog, mystical light rays, ethereal atmosphere">Ethereal Volumetric</option>
                                <option value="harsh cinematic studio lighting, dramatic shadows">Dramatic Studio</option>
                                <option value="warm candlelight, flickering glow, intimate shadows">Candlelight</option>
                                <option value="bioluminescent glow, mysterious otherworldly lighting">Bioluminescence</option>
                                <option value="flash photography, harsh direct light, polaroid style">Direct Flash</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs uppercase text-gray-400 block mb-2 font-semibold tracking-wider">Custom Style & Mood</label>
                            <textarea id="customStylePrompt" rows="2" class="w-full bg-gray-900/80 border border-gray-600 rounded-xl p-3 text-sm outline-none focus:border-yellow-500 transition-colors resize-none" placeholder="e.g., 1990s VHS camcorder footage, lo-fi..."></textarea>
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <button id="generateBtn" class="w-full font-bold py-4 rounded-2xl transition-all text-xl bg-yellow-500 text-black shadow-[0_0_15px_rgba(234,179,8,0.5)] hover:shadow-[0_0_25px_rgba(234,179,8,0.8)] hover:scale-[1.01] active:scale-[0.98]">
            GENERATE SCENE
        </button>

        <!-- Result & Editor Container -->
        <div id="resultContainer" class="mt-8 text-center pb-12 hidden">
            <div id="loader" class="text-2xl font-bold text-yellow-400 mb-4 flex items-center justify-center gap-3">
                <svg class="animate-spin h-8 w-8 text-yellow-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="loaderText">Synthesizing Pixels...</span>
            </div>
            
            <div id="editorWrapper" class="hidden flex flex-col items-center">
                
                <!-- Drawing Toolbar -->
                <div class="glass-panel mb-4 p-2 rounded-xl flex gap-2 sm:gap-4 items-center justify-center inline-flex shadow-lg">
                    <button id="toolDraw" class="text-yellow-400 font-bold p-2 bg-gray-700 rounded-lg transition-colors text-sm flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg> Draw
                    </button>
                    <button id="toolErase" class="text-gray-400 font-bold p-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors text-sm flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg> Erase
                    </button>
                    <div class="h-6 w-px bg-gray-600 mx-1"></div>
                    <label class="text-xs text-gray-400 font-bold">Size:</label>
                    <input type="range" id="brushSize" min="5" max="50" value="15" class="w-24 accent-yellow-500">
                    <div class="h-6 w-px bg-gray-600 mx-1"></div>
                    <button id="toolClear" class="text-red-400 font-bold p-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors text-sm">Clear Canvas</button>
                </div>

                <!-- Canvas Area -->
                <div class="relative inline-block border-4 border-yellow-500/20 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden bg-black/50">
                    <img id="outputImage" class="block max-w-full max-h-[65vh] object-contain">
                    <!-- The drawing layer -->
                    <canvas id="drawingCanvas" class="absolute top-0 left-0 w-full h-full cursor-crosshair touch-none"></canvas>
                </div>

                <!-- Edit Prompt Box -->
                <div class="mt-6 w-full max-w-2xl glass-panel p-4 rounded-xl border border-purple-500/30">
                    <label class="text-xs uppercase text-purple-400 block mb-2 font-semibold tracking-wider text-left flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        Edit Instructions & New Prompt
                    </label>
                    <textarea id="editPrompt" rows="2" class="w-full bg-gray-900/80 border border-gray-600 rounded-xl p-3 text-sm outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/50 transition-all resize-none shadow-inner" placeholder="Explain your annotation (e.g., 'turn the sketched area into a blue spaceship') or apply a new prompt to this image..."></textarea>
                </div>

                <div class="mt-4 flex flex-col sm:flex-row gap-4 justify-center w-full max-w-md">
                    <button id="editBtn" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 px-6 rounded-xl shadow-[0_0_15px_rgba(147,51,234,0.5)] hover:shadow-[0_0_20px_rgba(147,51,234,0.8)] transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                        Apply Edits to Image
                    </button>
                </div>
            </div>
        </div>

        <!-- Session Gallery Section -->
        <div id="gallerySection" class="mt-12 hidden pb-12">
            <h2 class="text-2xl font-bold mb-6 text-yellow-400 border-b border-gray-700/50 pb-2 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Session Gallery
            </h2>
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Gallery items injected here -->
            </div>
        </div>
    </div>

    <!-- Custom Message Modal -->
    <div id="msgModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-6 rounded-2xl max-w-md w-full mx-4 transform scale-95 transition-transform duration-300" id="msgModalContent">
            <h3 id="msgTitle" class="text-xl font-bold mb-2 text-yellow-400">Notice</h3>
            <p id="msgBody" class="text-gray-200 mb-6 whitespace-pre-wrap"></p>
            <button onclick="closeModal()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-xl transition-colors">Dismiss</button>
        </div>
    </div>

    <script>
        const apiKey = "";

        let uploadedJsonContent = null;
        let sessionGallery = []; // Track past generations
        let characterList = []; // Track character files and their name inputs

        // UI Elements
        const generateBtn = document.getElementById('generateBtn');
        const editBtn = document.getElementById('editBtn');
        const envInput = document.getElementById('envImage');
        const envJsonInput = document.getElementById('envJson');
        const charInput = document.getElementById('charImages');
        const addCharBtn = document.getElementById('addCharBtn');
        const outputImg = document.getElementById('outputImage');
        const resultBox = document.getElementById('resultContainer');
        const editorWrapper = document.getElementById('editorWrapper');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loaderText');

        // Canvas Elements
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // Modal Logic (Replacing alert)
        function showModal(title, message) {
            const modal = document.getElementById('msgModal');
            const content = document.getElementById('msgModalContent');
            document.getElementById('msgTitle').innerText = title;
            document.getElementById('msgBody').innerText = message;
            
            modal.classList.remove('hidden');
            // Trigger reflow
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
        }

        function closeModal() {
            const modal = document.getElementById('msgModal');
            const content = document.getElementById('msgModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // Preview Logic
        function handleImagePreview(fileInput, previewContainerId, isMultiple = false) {
            fileInput.addEventListener('change', function(e) {
                const container = document.getElementById(previewContainerId);
                container.innerHTML = ''; // Clear existing
                
                if (this.files && this.files.length > 0) {
                    container.classList.remove('hidden');
                    Array.from(this.files).forEach(file => {
                        const img = document.createElement('img');
                        img.src = URL.createObjectURL(file);
                        img.className = 'h-20 w-20 object-cover rounded-lg border border-gray-600 shrink-0';
                        img.onload = () => URL.revokeObjectURL(img.src); // Free memory
                        container.appendChild(img);
                    });
                } else {
                    container.classList.add('hidden');
                }
            });
        }

        handleImagePreview(envInput, 'envPreview');
        
        // Custom Character Preview & Naming Logic (Appending Mode)
        addCharBtn.addEventListener('click', () => {
            charInput.click();
        });

        charInput.addEventListener('change', function(e) {
            const container = document.getElementById('charPreviews');
            
            if (this.files && this.files.length > 0) {
                container.classList.remove('hidden');
                Array.from(this.files).forEach((file) => {
                    const charId = 'char_' + Date.now() + Math.random().toString(36).substring(2, 9);
                    
                    const wrap = document.createElement('div');
                    wrap.className = 'flex flex-col gap-2 bg-gray-900/50 p-2 rounded-xl border border-gray-700/50 relative group';
                    wrap.id = charId;
                    
                    // Remove button
                    const removeBtn = document.createElement('button');
                    removeBtn.innerHTML = '×';
                    removeBtn.className = 'absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm font-bold opacity-0 group-hover:opacity-100 transition-opacity z-10 hover:bg-red-600 hover:scale-110 shadow-lg';
                    removeBtn.onclick = () => {
                        wrap.remove();
                        characterList = characterList.filter(c => c.id !== charId);
                        if (characterList.length === 0) container.classList.add('hidden');
                    };

                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.className = 'h-24 w-full object-cover rounded-lg border border-gray-600 shrink-0';
                    img.onload = () => URL.revokeObjectURL(img.src); 
                    
                    const nameInput = document.createElement('input');
                    nameInput.type = 'text';
                    nameInput.placeholder = 'Name (e.g., Hero)';
                    nameInput.className = 'w-full bg-gray-800 border border-gray-600 rounded-lg p-2 text-xs text-white outline-none focus:border-purple-500 transition-colors';
                    
                    wrap.appendChild(removeBtn);
                    wrap.appendChild(img);
                    wrap.appendChild(nameInput);
                    container.appendChild(wrap);
                    
                    characterList.push({ id: charId, file: file, nameInput: nameInput });
                });
                
                // Clear input so the same file can be selected again if needed
                this.value = '';
            }
        });

        // JSON File parsing
        envJsonInput.addEventListener('change', function(e) {
            const file = this.files[0];
            const preview = document.getElementById('jsonPreview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        uploadedJsonContent = JSON.stringify(json);
                        preview.textContent = "Loaded Metadata: " + Object.keys(json).join(", ");
                        preview.classList.remove('hidden');
                    } catch (err) {
                        showModal("Error", "Invalid JSON file.");
                        this.value = '';
                        preview.classList.add('hidden');
                        uploadedJsonContent = null;
                    }
                };
                reader.readAsText(file);
            } else {
                preview.classList.add('hidden');
                uploadedJsonContent = null;
            }
        });

        // Helper: Convert File to Base64 (stripping the data url prefix)
        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        // Fetch with Exponential Backoff
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`HTTP error! status: ${response.status}, message: ${errorData.error?.message || 'Unknown error'}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // --- CANVAS DRAWING LOGIC ---
        let isDrawing = false;
        let isEraser = false;

        // Toolbar Events
        document.getElementById('toolDraw').onclick = function() {
            isEraser = false;
            this.classList.replace('text-gray-400', 'text-yellow-400');
            this.classList.replace('bg-gray-800', 'bg-gray-700');
            document.getElementById('toolErase').classList.replace('text-yellow-400', 'text-gray-400');
            document.getElementById('toolErase').classList.replace('bg-gray-700', 'bg-gray-800');
        };

        document.getElementById('toolErase').onclick = function() {
            isEraser = true;
            this.classList.replace('text-gray-400', 'text-yellow-400');
            this.classList.replace('bg-gray-800', 'bg-gray-700');
            document.getElementById('toolDraw').classList.replace('text-yellow-400', 'text-gray-400');
            document.getElementById('toolDraw').classList.replace('bg-gray-700', 'bg-gray-800');
        };

        document.getElementById('toolClear').onclick = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        // Resize Canvas internally to match image resolution when loaded
        outputImg.onload = () => {
            canvas.width = outputImage.naturalWidth || 800;
            canvas.height = outputImage.naturalHeight || 800;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            editorWrapper.classList.remove('hidden');
        };

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            // Calculate scale between displayed size and actual canvas coordinate size
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startPosition(e) {
            e.preventDefault();
            isDrawing = true;
            draw(e);
        }

        function endPosition() {
            isDrawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getMousePos(e);

            ctx.lineWidth = document.getElementById('brushSize').value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (isEraser) {
                ctx.globalCompositeOperation = "destination-out";
                ctx.strokeStyle = "rgba(0,0,0,1)";
            } else {
                ctx.globalCompositeOperation = "source-over";
                // Bright, highly visible color for annotation
                ctx.strokeStyle = "rgba(234, 88, 12, 0.8)"; 
            }

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        // Event Listeners
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseout', endPosition);

        canvas.addEventListener('touchstart', startPosition, {passive: false});
        canvas.addEventListener('touchend', endPosition, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        
        // Utility: Composite Image + Canvas to Base64
        function getCompositeBase64() {
             const compCanvas = document.createElement('canvas');
             compCanvas.width = canvas.width;
             compCanvas.height = canvas.height;
             const compCtx = compCanvas.getContext('2d');
             
             // Draw base image
             compCtx.drawImage(outputImg, 0, 0);
             // Draw annotations
             compCtx.drawImage(canvas, 0, 0);
             
             return compCanvas.toDataURL('image/png').split(',')[1];
        }

        // --- END CANVAS LOGIC ---

        // Gallery Render Function
        function renderGallery() {
            const gallerySection = document.getElementById('gallerySection');
            const galleryGrid = document.getElementById('galleryGrid');
            
            if (sessionGallery.length === 0) {
                gallerySection.classList.add('hidden');
                return;
            }
            
            gallerySection.classList.remove('hidden');
            galleryGrid.innerHTML = '';
            
            // Render in reverse order (newest first)
            [...sessionGallery].reverse().forEach((item) => {
                const card = document.createElement('div');
                card.className = 'glass-panel rounded-2xl overflow-hidden flex flex-col transition-all hover:scale-[1.02] hover:shadow-[0_0_15px_rgba(234,179,8,0.3)] border border-gray-700/50 group cursor-pointer';
                
                // Truncate styling text for UI badges
                const shortStyle = item.style ? item.style.split(',')[0] : (item.customStyle ? 'Custom Style' : 'No Style');
                const shortLighting = item.lighting ? item.lighting.split(',')[0] : '';
                const lightingBadge = shortLighting ? `<span class="text-[10px] uppercase bg-gray-800 text-blue-400 px-2 py-1 rounded-full truncate max-w-[100px]" title="${item.lighting}">${shortLighting}</span>` : '';
                const negBadge = item.negativePrompt ? `<span class="text-[10px] uppercase bg-red-900/50 text-red-400 px-2 py-1 rounded-full truncate max-w-[80px]" title="${item.negativePrompt}">-Neg</span>` : '';

                card.innerHTML = `
                    <div class="h-48 overflow-hidden bg-gray-900 relative">
                        <img src="${item.imageUrl}" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity">
                        <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" onclick="restoreSettings('${item.id}')">
                            <button class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 px-4 rounded-xl shadow-[0_0_15px_rgba(234,179,8,0.5)] transform scale-95 group-hover:scale-100 transition-all">
                                Apply Settings
                            </button>
                        </div>
                    </div>
                    <div class="p-4 flex-1 flex flex-col gap-3">
                        <p class="text-sm text-gray-200 line-clamp-3 italic flex-1">"${item.prompt}"</p>
                        <div class="flex flex-wrap gap-2 mt-auto pt-2 border-t border-gray-700/50">
                            <span class="text-[10px] uppercase bg-gray-800 text-yellow-400 px-2 py-1 rounded-full truncate max-w-[100px]" title="${item.style || item.customStyle}">${shortStyle}</span>
                            ${lightingBadge}
                            ${negBadge}
                        </div>
                    </div>
                `;
                galleryGrid.appendChild(card);
            });
        }

        // Gallery Restore Function (Global to be accessible by inline onclick)
        window.restoreSettings = function(id) {
            const item = sessionGallery.find(g => g.id === id);
            if (!item) return;

            // Re-populate inputs
            document.getElementById('userPrompt').value = item.prompt;
            document.getElementById('negPrompt').value = item.negativePrompt || '';
            document.getElementById('stylePreset').value = item.style || '';
            document.getElementById('lightingPreset').value = item.lighting || '';
            document.getElementById('customStylePrompt').value = item.customStyle || '';
            if (document.getElementById('editPrompt')) document.getElementById('editPrompt').value = '';
            
            // Re-populate Image & reveal editor
            outputImg.src = item.imageUrl;
            resultBox.classList.remove('hidden');
            loader.classList.add('hidden');
            
            // Smooth scroll back up to the controls
            document.getElementById('mainControls').scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.innerText = "⚡ Image restored. Ready for edits!";
            statusMsg.classList.remove('text-emerald-400');
            statusMsg.classList.add('text-yellow-400');
            
            setTimeout(() => {
                statusMsg.innerText = "System Online. Dual-Model Routing Active.";
                statusMsg.classList.add('text-emerald-400');
                statusMsg.classList.remove('text-yellow-400');
            }, 3000);
        };

        // Shared API execution function (used by both Generate and Edit)
        async function executeGeneration(isEditMode = false) {
            const style = document.getElementById('stylePreset').value;
            const lighting = document.getElementById('lightingPreset').value;
            const customStyle = document.getElementById('customStylePrompt').value.trim();
            const basePrompt = document.getElementById('userPrompt').value.trim();
            const negPrompt = document.getElementById('negPrompt').value.trim();
            const editPrompt = document.getElementById('editPrompt') ? document.getElementById('editPrompt').value.trim() : "";

            if (!isEditMode && !basePrompt) {
                showModal("Wait!", "Please describe the scene in the prompt area before generating.");
                return;
            }
            if (isEditMode && !basePrompt && !editPrompt) {
                showModal("Wait!", "Please provide either a scene description or edit instructions.");
                return;
            }

            // Check conditions
            const hasEnvImages = !!envInput.files[0] || characterList.length > 0;
            const requiresImageModel = hasEnvImages || isEditMode;

            let fullPrompt = `Generate an image matching this description: "${basePrompt}".`;
            if (style) fullPrompt += `\nStyle requirements: ${style}.`;
            if (lighting) fullPrompt += `\nLighting requirements: ${lighting}.`;
            if (customStyle) fullPrompt += `\nAdditional Style & Mood instructions: ${customStyle}.`;
            
            if (isEditMode) {
                const activeInstruction = editPrompt || basePrompt || "Apply the drawn edits to the image.";
                fullPrompt = `I am providing an image that has been annotated/drawn over. Please apply the edits requested in this prompt to the image, using the annotations as guidance for where and what to change: "${activeInstruction}".`;
                if (style) fullPrompt += `\nEnsure it matches style: ${style}.`;
                if (lighting) fullPrompt += `\nEnsure it matches lighting: ${lighting}.`;
                if (customStyle) fullPrompt += `\nAdditional style constraints: ${customStyle}.`;
            }
            
            if (uploadedJsonContent) {
                fullPrompt += `\nIncorporate these conceptual metadata details into the composition: ${uploadedJsonContent}`;
            }
            
            if (negPrompt && requiresImageModel) {
                fullPrompt += `\n\nCRITICALLY IMPORTANT - YOU MUST AVOID THE FOLLOWING: ${negPrompt}`;
            }

            // Update UI State
            generateBtn.disabled = true;
            editBtn.disabled = true;
            generateBtn.classList.add('opacity-75');
            editBtn.classList.add('opacity-75');
            resultBox.classList.remove('hidden');
            editorWrapper.classList.add('hidden');
            loader.classList.remove('hidden');
            loaderText.innerText = isEditMode ? "Processing Image Edits..." : "Synthesizing Pixels...";

            try {
                let finalImageUrl = "";

                if (requiresImageModel) {
                    // IMAGE-TO-IMAGE ROUTE (Editing or references)
                    const parts = [{ text: fullPrompt }];
                    
                    if (isEditMode) {
                        // We composite the base image with the canvas drawing strokes to send to the AI
                        const compositeB64 = getCompositeBase64();
                        parts.push({ text: "Annotated Image to Edit:" });
                        parts.push({ inlineData: { mimeType: "image/png", data: compositeB64 } });
                    } else {
                        // Standard references
                        if (envInput.files[0]) {
                            const base64Data = await fileToBase64(envInput.files[0]);
                            parts.push({ text: "Environment Context Image:" });
                            parts.push({ inlineData: { mimeType: envInput.files[0].type, data: base64Data } });
                        }

                        for (const char of characterList) {
                            const base64Data = await fileToBase64(char.file);
                            const charName = char.nameInput.value.trim() || "Unnamed Character";
                            parts.push({ text: `Character Reference Image ("${charName}"):` });
                            parts.push({ inlineData: { mimeType: char.file.type, data: base64Data } });
                        }
                    }

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;
                    const payload = {
                        contents: [{ parts: parts }],
                        generationConfig: { responseModalities: ["IMAGE"] }
                    };

                    const result = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const base64Out = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    if (!base64Out) throw new Error("Model did not return an image. Try adjusting your prompt.");
                    finalImageUrl = `data:image/png;base64,${base64Out}`;

                } else {
                    // TEXT-TO-IMAGE ROUTE
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                    const payload = {
                        instances: { prompt: fullPrompt },
                        parameters: { sampleCount: 1 }
                    };
                    
                    if (negPrompt) {
                        payload.parameters.negativePrompt = negPrompt;
                    }

                    const result = await fetchWithRetry(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!result.predictions || !result.predictions[0] || !result.predictions[0].bytesBase64Encoded) {
                         throw new Error("Imagen generation failed.");
                    }
                    finalImageUrl = `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                }

                // Save to Gallery
                const galleryItem = {
                    id: 'gen_' + Date.now() + Math.random().toString(36).substring(2, 9),
                    imageUrl: finalImageUrl,
                    prompt: isEditMode && editPrompt ? editPrompt : basePrompt,
                    negativePrompt: negPrompt,
                    style: style,
                    lighting: lighting,
                    customStyle: customStyle
                };
                sessionGallery.push(galleryItem);
                renderGallery();

                // Display Result (Triggers outputImg.onload which shows the editor)
                outputImg.src = finalImageUrl;
                loader.classList.add('hidden');
                
                outputImg.scrollIntoView({ behavior: 'smooth', block: 'center' });

            } catch (err) {
                console.error(err);
                loader.classList.add('hidden');
                // Ensure editor comes back if it failed during an edit
                if (outputImg.src) editorWrapper.classList.remove('hidden');
                showModal("Generation Error", "Failed to synthesize image. " + err.message);
            } finally {
                generateBtn.disabled = false;
                editBtn.disabled = false;
                generateBtn.classList.remove('opacity-75');
                editBtn.classList.remove('opacity-75');
            }
        }

        // Button Listeners
        generateBtn.onclick = () => executeGeneration(false);
        editBtn.onclick = () => executeGeneration(true);

    </script>
</body>
